<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Motorista de appbr</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #FFD700;
            margin: 0;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        input[type="tel"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #25D366; /* Cor oficial do WhatsApp */
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #128C7E;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Motorista de appbr</h2>
        <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
        <button onclick="enviarParaWhatsApp()">Cadastre-se</button>
    </div>

    <script>
        function enviarParaWhatsApp() {
            var telefoneDigitado = document.getElementById('telefone').value;
            
            if(telefoneDigitado.trim() === '') {
                alert('Por favor, digite seu número de telefone.');
                return;
            }

            // ATENÇÃO: Substitua pelo número de WhatsApp da sua empresa
            // Formato: Código do país (55) + DDD (11) + Número. Tudo junto, sem espaços ou símbolos.
            var numeroDestino = '5511999999999'; 
            
            // Mensagem que será preenchida automaticamente no WhatsApp
            var mensagem = 'Cadastre-se. Meu número é: ' + telefoneDigitado;
            
            // Gera o link da API oficial do WhatsApp e abre em uma nova aba
            var url = 'https://wa.me/' + numeroDestino + '?text=' + encodeURIComponent(mensagem);
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
